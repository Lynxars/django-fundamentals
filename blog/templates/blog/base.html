<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My Blog{% endblock %}</title>
  <style>
    /* minimal reset + layout */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; color: #222; }
    nav { background: #085041; padding: 1rem 2rem;
          display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #9FE1CB; text-decoration: none; margin-left: 1rem; }
    nav .brand { color: #fff; font-weight: bold; font-size: 1.1rem; }
    main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    footer { text-align: center; padding: 2rem; color: #888; font-size: 0.85rem;
            border-top: 1px solid #eee; margin-top: 3rem; }
  </style>
</head>
<body>
 
  <nav>
    <span class="brand">My Blog</span>
    <div>
      <a href="{% url 'blog:home' %}">Home</a>
      <a href="{% url 'blog:about' %}">About</a>
    </div>
  </nav>
 
  <main>
    {% block content %}
    {% endblock %}
  </main>
 
  <footer>
    <p>My Blog — Built with Django</p>
  </footer>
 
</body>
</html>
